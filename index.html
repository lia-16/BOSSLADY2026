<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>BOSS LADY — Planner</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --cream: #FAF7F2; --rose: #C97B6B; --gold: #C9A84C; --charcoal: #2A2220; --border: #E0D5CF;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--charcoal); }
        
        header { background: var(--charcoal); padding: 25px; text-align: center; }
        .logo { font-family: 'Playfair Display', serif; color: var(--gold); font-size: 1.5rem; letter-spacing: 1px; }

        .nav-tabs { display: flex; justify-content: center; background: white; border-bottom: 1px solid var(--border); }
        .tab { padding: 15px 20px; border: none; background: none; font-size: 0.8rem; font-weight: 700; color: #888; cursor: pointer; text-transform: uppercase; }
        .tab.active { color: var(--rose); border-bottom: 2px solid var(--rose); }

        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        
        .date-display { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; font-family: 'Playfair Display', serif; font-style: italic; font-size: 1.2rem; }

        .card { background: white; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 20px; overflow: hidden; }
        .card-header { padding: 15px; background: #FFF9F4; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; font-weight: 700; }
        
        .item { display: flex; align-items: center; padding: 12px 15px; border-bottom: 1px solid var(--cream); }
        .item-text { flex: 1; margin: 0 10px; font-size: 0.95rem; }
        .item-text.done { text-decoration: line-through; color: #aaa; }
        
        .btn-star { background: none; border: none; font-size: 1.2rem; cursor: pointer; transition: 0.2s; }
        .input-area { width: 100%; padding: 15px; border: none; background: #fafafa; font-family: inherit; }
        
        button.nav-arrow { background: none; border: none; font-size: 1.5rem; color: var(--rose); cursor: pointer; }
    </style>
</head>
<body>

<header><div class="logo">BOSS LADY</div></header>

<div class="nav-tabs" id="tabs"></div>

<div class="container">
    <div class="date-display">
        <button class="nav-arrow" onclick="changeDate(-1)">‹</button>
        <span id="currentDateLabel"></span>
        <button class="nav-arrow" onclick="changeDate(1)">›</button>
    </div>
    <div id="sections"></div>
</div>

<script>
    // --- DATA & STATE ---
    let state = JSON.parse(localStorage.getItem('boss_v1')) || {
        view: 'Quotidien',
        date: new Date().toISOString().split('T')[0],
        categories: [
            { id: 'c1', name: 'Priorités', icon: '✨' },
            { id: 'c2', name: 'Bien-être', icon: '🌿' }
        ],
        tasks: {},
        permanentTasks: [] // Liste des textes des tâches récurrentes
    };

    const save = () => localStorage.setItem('boss_v1', JSON.stringify(state));

    // --- NAVIGATION FIX ---
    function changeDate(days) {
        let d = new Date(state.date + "T00:00:00"); // Fix pour iPhone (Midnight UTC)
        if (state.view === 'Quotidien') d.setDate(d.getDate() + days);
        else if (state.view === 'Hebdomadaire') d.setDate(d.getDate() + (days * 7));
        else d.setMonth(d.getMonth() + days);
        
        state.date = d.toISOString().split('T')[0];
        checkPermanent(); // On injecte les tâches permanentes au changement de jour
        render();
    }

    // --- LOGIQUE PERMANENTE ---
    function checkPermanent() {
        state.categories.forEach(cat => {
            const key = `${state.view}-${state.date}-${cat.id}`;
            if (!state.tasks[key]) state.tasks[key] = [];
            
            state.permanentTasks.forEach(pTask => {
                const exists = state.tasks[key].some(t => t.text === pTask.text && t.catId === cat.id);
                if (exists === false && pTask.catId === cat.id) {
                    state.tasks[key].push({ text: pTask.text, done: false, star: true });
                }
            });
        });
    }

    function toggleStar(key, index, catId) {
        const task = state.tasks[key][index];
        task.star = !task.star;

        if (task.star) {
            state.permanentTasks.push({ text: task.text, catId: catId });
        } else {
            state.permanentTasks = state.permanentTasks.filter(t => t.text !== task.text || t.catId !== catId);
        }
        render();
    }

    // --- RENDERING ---
    function render() {
        save();
        
        // Onglets
        const views = ['Quotidien', 'Hebdomadaire', 'Mensuel'];
        document.getElementById('tabs').innerHTML = views.map(v => `
            <button class="tab ${state.view === v ? 'active' : ''}" onclick="state.view='${v}'; render();">${v}</button>
        `).join('');

        // Date Label
        const options = { day: 'numeric', month: 'long' };
        document.getElementById('currentDateLabel').innerText = new Date(state.date + "T00:00:00").toLocaleDateString('fr-FR', options);

        // Contenu
        document.getElementById('sections').innerHTML = state.categories.map(cat => {
            const key = `${state.view}-${state.date}-${cat.id}`;
            const tasks = state.tasks[key] || [];
            return `
                <div class="card">
                    <div class="card-header"><span>${cat.icon} ${cat.name}</span></div>
                    <div>
                        ${tasks.map((t, i) => `
                            <div class="item">
                                <input type="checkbox" ${t.done ? 'checked' : ''} onclick="toggleTask('${key}', ${i})">
                                <span class="item-text ${t.done ? 'done' : ''}">${t.text}</span>
                                <button class="btn-star" onclick="toggleStar('${key}', ${i}, '${cat.id}')">
                                    ${t.star ? '⭐' : '☆'}
                                </button>
                            </div>
                        `).join('')}
                    </div>
                    <input type="text" class="input-area" placeholder="Ajouter..." onkeydown="if(event.key==='Enter') addTask('${key}', this)">
                </div>
            `;
        }).join('');
    }

    function addTask(key, input) {
        if (!input.value) return;
        if (!state.tasks[key]) state.tasks[key] = [];
        state.tasks[key].push({ text: input.value, done: false, star: false });
        input.value = '';
        render();
    }

    function toggleTask(key, i) {
        state.tasks[key][i].done = !state.tasks[key][i].done;
        render();
    }

    // Init
    checkPermanent();
    render();
</script>
</body>
</html>
